name: hexadian-hauling-helper

x-mongo-common: &mongo-common
  image: mirror.gcr.io/library/mongo:7
  dns:
    - 8.8.8.8
    - 1.1.1.1
  command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
  healthcheck:
    test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
    interval: 5s
    timeout: 5s
    retries: 10

x-mongo-uri: &mongo-uri "mongodb://mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0&readPreference=nearest"

services:
  mongo1:
    <<: *mongo-common
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db
    networks:
      - hhh-inner-net

  mongo2:
    <<: *mongo-common
    ports:
      - "27018:27017"
    volumes:
      - mongo2_data:/data/db
    networks:
      - hhh-inner-net

  mongo3:
    <<: *mongo-common
    ports:
      - "27019:27017"
    volumes:
      - mongo3_data:/data/db
    networks:
      - hhh-inner-net

  mongo-init:
    image: mirror.gcr.io/library/mongo:7
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
    restart: "no"
    networks:
      - hhh-inner-net
    entrypoint: ["mongosh", "--host", "mongo1:27017", "--eval", "
      try {
        rs.status();
        print('Replica set already initialized');
      } catch(e) {
        rs.initiate({
          _id: 'rs0',
          members: [
            { _id: 0, host: 'mongo1:27017', priority: 2 },
            { _id: 1, host: 'mongo2:27017', priority: 1 },
            { _id: 2, host: 'mongo3:27017', priority: 1 }
          ]
        });
        print('Replica set initiated');
      }
      "]

  contracts-service:
    build: ./hhh-contracts-service
    ports:
      - "8001:8001"
    environment:
      - HHH_CONTRACTS_MONGO_URI=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0&readPreference=nearest
      - HHH_CONTRACTS_JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      mongo1:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    networks:
      - hhh-inner-net
      - hhh-outer-net
      - hexadian-net

  ships-service:
    build: ./hhh-ships-service
    ports:
      - "8002:8002"
    environment:
      - HHH_SHIPS_MONGO_URI=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0&readPreference=nearest
      - HHH_SHIPS_JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      mongo1:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    networks:
      - hhh-inner-net
      - hhh-outer-net
      - hexadian-net

  maps-service:
    build: ./hhh-maps-service
    ports:
      - "8003:8003"
    environment:
      - HHH_MAPS_MONGO_URI=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0&readPreference=nearest
      - HHH_MAPS_JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      mongo1:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    networks:
      - hhh-inner-net
      - hhh-outer-net
      - hexadian-net

  graphs-service:
    build: ./hhh-graphs-service
    ports:
      - "8004:8004"
    environment:
      - HHH_GRAPHS_MONGO_URI=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0&readPreference=nearest
      - HHH_GRAPHS_JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      mongo1:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    networks:
      - hhh-inner-net
      - hhh-outer-net
      - hexadian-net

  routes-service:
    build: ./hhh-routes-service
    ports:
      - "8005:8005"
    environment:
      - HHH_ROUTES_MONGO_URI=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0&readPreference=nearest
      - HHH_ROUTES_JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - HHH_ROUTES_CONTRACTS_SERVICE_URL=http://contracts-service:8001
      - HHH_ROUTES_SHIPS_SERVICE_URL=http://ships-service:8002
      - HHH_ROUTES_MAPS_SERVICE_URL=http://maps-service:8003
      - HHH_ROUTES_GRAPHS_SERVICE_URL=http://graphs-service:8004
    depends_on:
      mongo1:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      contracts-service:
        condition: service_started
      ships-service:
        condition: service_started
      maps-service:
        condition: service_started
      graphs-service:
        condition: service_started
    networks:
      - hhh-inner-net
      - hhh-outer-net
      - hexadian-net

  commodities-service:
    build: ./hhh-commodities-service
    ports:
      - "8007:8007"
    environment:
      - HHH_COMMODITIES_MONGO_URI=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0&readPreference=nearest
      - HHH_COMMODITIES_JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      mongo1:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    networks:
      - hhh-inner-net
      - hhh-outer-net
      - hexadian-net

  frontend:
    build: ./hhh-frontend
    ports:
      - "3000:3000"
    depends_on:
      - contracts-service
      - ships-service
      - maps-service
      - graphs-service
      - routes-service
      - commodities-service
    networks:
      - hhh-outer-net
      - hexadian-net

  backoffice-frontend:
    build: ./hhh-backoffice-frontend
    ports:
      - "3001:3001"
    depends_on:
      - contracts-service
      - ships-service
      - maps-service
      - graphs-service
      - routes-service
      - commodities-service
    networks:
      - hhh-outer-net
      - hexadian-net

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data:

networks:
  hhh-inner-net:
    name: hexadian-hauling-helper-inner-net
    internal: true
  hhh-outer-net:
    name: hexadian-hauling-helper-outer-net
  hexadian-net:
    name: hexadian-shared-net
