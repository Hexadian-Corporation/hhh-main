name: Sync Submodule Refs

on:
  repository_dispatch:
    types: [submodule-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Update Submodule Refs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.PROJECT_TOKEN }}

      - name: Update submodules to latest main
        run: git submodule update --remote --merge

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Update lockfiles in Python services
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          for svc in hhh-contracts-service hhh-ships-service hhh-maps-service hhh-graphs-service hhh-routes-service hhh-commodities-service; do
            echo "── $svc ──"
            cd "$svc"
            uv sync
            if ! git diff --quiet; then
              git add uv.lock
              git commit -m "chore: update lockfile"
              git push
              echo "  -> lockfile updated and pushed"
            else
              echo "  -> up to date"
            fi
            cd ..
          done

      - name: Check for ref changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "### Changed submodules:" >> "$GITHUB_STEP_SUMMARY"
            git diff --submodule=short >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit and push updated refs
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add -A
          git commit -m "chore: sync submodule refs to latest main"
          git push
