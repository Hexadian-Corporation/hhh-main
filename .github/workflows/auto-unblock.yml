name: Auto-unblock tasks

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unblock:
    name: Check blocked tasks
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
    steps:
      - name: Check and unblock tasks
        shell: bash
        run: |
          ORG="Hexadian-Corporation"
          PROJECT_ID="PVT_kwDOD_yaZ84BRv-S"
          STATUS_FIELD_ID="PVTSSF_lADOD_yaZ84BRv-Szg_fF9E"
          BLOCKED_ID="fbfa34a2"
          READY_ID="3a8dc8b6"

          # Fetch all project items with their issue node IDs
          items_json=$(gh api graphql -f query='
            query {
              node(id: "'"$PROJECT_ID"'") {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      id
                      fieldValueByName(name: "Status") {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          optionId
                        }
                      }
                      content {
                        ... on Issue {
                          id
                          number
                          state
                          repository { nameWithOwner }
                        }
                      }
                    }
                  }
                }
              }
            }
          ')

          if [ -z "$items_json" ]; then
            echo "::error::Failed to fetch project items"
            exit 1
          fi

          # Extract blocked items into a temp file
          echo "$items_json" | jq -c '
            [.data.node.items.nodes[] |
             select(.fieldValueByName.optionId == "'"$BLOCKED_ID"'") |
             select(.content.number != null)]
          ' > /tmp/blocked.json

          count=$(jq 'length' /tmp/blocked.json)
          echo "Found $count blocked items"

          if [ "$count" -eq 0 ]; then
            echo "No blocked items to check."
            exit 0
          fi

          # Process each blocked item
          num_items=$(jq 'length' /tmp/blocked.json)
          for (( i=0; i<num_items; i++ )); do
            item_id=$(jq -r ".[$i].id" /tmp/blocked.json)
            issue_node_id=$(jq -r ".[$i].content.id" /tmp/blocked.json)
            repo_full=$(jq -r ".[$i].content.repository.nameWithOwner" /tmp/blocked.json)
            issue_number=$(jq -r ".[$i].content.number" /tmp/blocked.json)

            echo ""
            echo "=== Checking $repo_full#$issue_number ==="

            # Query blockedBy relationships via GraphQL
            blockers_json=$(gh api graphql -f query='
              query {
                node(id: "'"$issue_node_id"'") {
                  ... on Issue {
                    blockedBy(first: 20) {
                      nodes {
                        number
                        state
                        repository { nameWithOwner }
                      }
                    }
                  }
                }
              }
            ')

            blocker_count=$(echo "$blockers_json" | jq '.data.node.blockedBy.nodes | length')

            if [ "$blocker_count" -eq 0 ]; then
              echo "  No blockedBy relationships found, moving to Ready."
              gh api graphql -f query='
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "'"$PROJECT_ID"'"
                    itemId: "'"$item_id"'"
                    fieldId: "'"$STATUS_FIELD_ID"'"
                    value: { singleSelectOptionId: "'"$READY_ID"'" }
                  }) { projectV2Item { id } }
                }
              '
              continue
            fi

            echo "  Blockers: $blocker_count"

            all_resolved=true
            echo "$blockers_json" | jq -c '.data.node.blockedBy.nodes[]' > /tmp/blockers_$i.json
            while IFS= read -r blocker; do
              b_repo=$(echo "$blocker" | jq -r '.repository.nameWithOwner')
              b_num=$(echo "$blocker" | jq -r '.number')
              b_state=$(echo "$blocker" | jq -r '.state')
              echo "  $b_repo#$b_num -> $b_state"

              if [ "$b_state" != "CLOSED" ]; then
                all_resolved=false
              fi
            done < /tmp/blockers_$i.json

            if [ "$all_resolved" = true ]; then
              echo "  ✅ All blockers resolved! Moving to Ready."
              gh api graphql -f query='
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "'"$PROJECT_ID"'"
                    itemId: "'"$item_id"'"
                    fieldId: "'"$STATUS_FIELD_ID"'"
                    value: { singleSelectOptionId: "'"$READY_ID"'" }
                  }) { projectV2Item { id } }
                }
              '
            else
              echo "  ⏳ Still blocked."
            fi
          done

          echo ""
          echo "Done."
