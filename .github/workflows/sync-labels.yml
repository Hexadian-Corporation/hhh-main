name: Sync labels

on:
  push:
    branches: [main]
    paths:
      - ".github/labels.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - hhh-main
          - hhh-contracts-service
          - hhh-ships-service
          - hhh-maps-service
          - hhh-graphs-service
          - hhh-routes-service
          - hhh-auth-service
          - hhh-frontend
          - hhh-backoffice-frontend
          - hhh-commodities-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync labels
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          repository: "Hexadian-Corporation/${{ matrix.repo }}"
          delete-other-labels: false
          token: ${{ secrets.LABEL_SYNC_TOKEN }}
